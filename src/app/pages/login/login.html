
<div class="p-6 max-w-md mx-auto">
  <h1 class="text-2xl font-semibold mb-6">Đăng Nhập</h1>

  <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="space-y-6">
    <div>
      <label class="block font-medium mb-1">Email</label>
      <input formControlName="email" type="email" class="w-full border rounded-lg px-3 py-2" />
      @if(this.loginForm.get("email")?.invalid && this.loginForm.get("email")?.touched) {
        <span class="text-red-500">Không được bỏ chống</span>
      }
    </div>

    <div>
      <label class="block font-medium mb-1">Mật khẩu</label>
      <input formControlName="password" type="password" class="w-full border rounded-lg px-3 py-2" />
      @if(this.loginForm.get("password")?.invalid && this.loginForm.get("password")?.touched) {
        <span class="text-red-500">Không được bỏ chống</span>
      }
    </div>

    <button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded-lg w-full" [disabled] = "loginForm.invalid">Đăng Nhập</button>
  </form>
</div>
