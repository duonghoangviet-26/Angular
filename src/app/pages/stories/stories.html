<h2>Danh sách chuyện tranh</h2>
<div class="story-card">
    <table border="1">
        <thead>
            <tr>
                <td>ID</td>
                <th>Title</th>
                <th>Author</th>
                <th>Views</th>
                <th>Hành động</th>
            </tr>
        </thead>

        <tbody>
            @for(story of stories; track story.id ; let i = $index) {
            <tr>
                <td>{{i + 1}}</td>
                <td> {{ story.title }}</td>
                <td>{{ story.author }}</td>
                <td>{{ story.views }}</td>
                <td><button (click)="hanhleClick(story.id)">Xóa</button>
                    <a routerLink="/edit/{{story.id}}">Sửa</a>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
